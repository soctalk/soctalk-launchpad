name: release

# Builds, signs, and publishes the launchpad CLI + plugin artifacts on a v* tag.
# Signing runs only inside the protected `release` environment, so the signing
# key is exposed only after manual approval and never on untrusted PR code.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release   # requires configured reviewers to approve before secrets are available
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Derive version from tag
        id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Cross-build, generate + sign index
        env:
          VERSION: ${{ steps.v.outputs.version }}
          # Public key is a repo variable (not secret); it is embedded in the CLI.
          PUBKEY: ${{ vars.LAUNCHPAD_PUBLIC_KEY }}
          BASE_URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}
          # Private signing key is a protected-environment secret.
          LAUNCHPAD_SIGN_KEY: ${{ secrets.LAUNCHPAD_SIGN_KEY }}
        run: |
          test -n "$PUBKEY" || { echo "LAUNCHPAD_PUBLIC_KEY repo variable is not set"; exit 1; }
          test -n "$LAUNCHPAD_SIGN_KEY" || { echo "LAUNCHPAD_SIGN_KEY secret is not set"; exit 1; }
          bash scripts/build-release.sh

      - name: Generate SBOM
        continue-on-error: true   # provenance is best-effort; never block the release
        uses: anchore/sbom-action@v0
        with:
          path: .
          output-file: dist/artifacts/launchpad.sbom.spdx.json

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/artifacts/*
          fail_on_unmatched_files: true
